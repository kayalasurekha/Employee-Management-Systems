{% extends "base.html" %}

{% block content %}

<h2>Edit Employee</h2>

<form method="POST">

    <div class="mb-3">
        <label>Name</label>
        <input type="text" name="name" value="{{ employee.name }}" class="form-control" required>
    </div>

    <div class="mb-3">
        <label>Email</label>
        <input type="email" name="email" value="{{ employee.email }}" class="form-control" required>
    </div>

    <div class="mb-3">
        <label>Department</label>
        <input type="text" name="department" value="{{ employee.department }}" class="form-control" required>
    </div>

    <div class="mb-3">
        <label>Salary</label>
        <input type="number" name="salary" value="{{ employee.salary }}" class="form-control" required>
    </div>

    <button type="submit" class="btn btn-success">Update Employee</button>
    <a href="/" class="btn btn-secondary">Back</a>

</form>

{% endblock %}
